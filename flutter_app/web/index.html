<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="teacher_tool">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>教师工作台</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="/api/v1" crossorigin>
  <style>
    @media (prefers-color-scheme: dark) {
      body { background: #0F1410 !important; }
      #loading-text { color: #B8C4BC !important; }
      #app-name { color: #F4F1EC !important; }
      #app-tag { color: #B8C4BC !important; }
    }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background:
        radial-gradient(1200px 600px at 0% 0%, rgba(122, 168, 116, 0.18), transparent 60%),
        radial-gradient(900px 600px at 100% 100%, rgba(232, 138, 90, 0.18), transparent 60%),
        #FBF8F4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      animation: fadeIn 0.4s ease-out;
    }
    #loading-logo {
      width: 84px;
      height: 84px;
      border-radius: 22px;
      background: linear-gradient(135deg, #7AA874 0%, #E88A5A 60%, #6F8FB7 100%);
      box-shadow: 0 12px 36px rgba(122, 168, 116, 0.35), 0 4px 12px rgba(232, 138, 90, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 2.4s ease-in-out infinite;
    }
    #loading-logo svg { width: 44px; height: 44px; color: white; }
    #app-name {
      color: #2A3328;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-top: 4px;
    }
    #app-tag {
      color: #6E7B70;
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    #loading-spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(122, 168, 116, 0.18);
      border-top-color: #7AA874;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-top: 8px;
    }
    #loading-text {
      color: #6E7B70;
      font-size: 12px;
      letter-spacing: 1px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #loading.fading { opacity: 0; transition: opacity 0.35s ease-out; }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
        <path d="M6 12v5c3 3 9 3 12 0v-5"/>
      </svg>
    </div>
    <div id="app-name">教师工作台</div>
    <div id="app-tag">让教学更智能 · 让课堂更精彩</div>
    <div id="loading-spinner"></div>
    <span id="loading-text">正在加载…</span>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (!loading) return;
      loading.classList.add('fading');
      setTimeout(function () { loading.style.display = 'none'; }, 380);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
