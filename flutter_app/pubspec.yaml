name: teacher_tool
description: AI-powered teacher tool for class management
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3+1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1

  # Animation
  lottie: ^3.1.2
  animations: ^2.0.11
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.19.0
  image_picker: ^1.0.7
  file_picker: ^8.0.3
  excel: ^4.0.3
  csv: ^6.0.0

  # PDF / Print export
  pdf: ^3.11.0
  printing: ^5.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
  fonts:
    - family: SimHei
      fonts:
        - asset: assets/fonts/SimHei.ttf
